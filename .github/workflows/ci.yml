name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          path: repo
      # GitHub Actions checks out one repo in isolation, but npm ci needs the
      # sibling `file:../` dep (@fiducia/interfaces) present alongside so
      # `../fiducia-interfaces` resolves.
      - uses: actions/checkout@v4
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
        working-directory: repo
      # Syntax-check the Worker entrypoint (node --check src/index.mjs).
      - run: npm run check
        working-directory: repo
      # Worker unit tests (src/index.test.mjs). No deploy — the Worker runs on
      # Cloudflare's edge, not in CI.
      - run: node --test
        working-directory: repo
