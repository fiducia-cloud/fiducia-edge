name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm ci
      # Syntax-check the Worker entrypoint (node --check src/index.mjs).
      - run: npm run check
      # Worker unit tests (src/index.test.mjs). No deploy — the Worker runs on
      # Cloudflare's edge, not in CI.
      - run: node --test
