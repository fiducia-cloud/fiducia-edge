# CI: install, lint, and test the Worker on push and pull request.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          path: repo
      # GitHub Actions checks out one repo in isolation, but npm ci needs the
      # sibling `file:../` dep (@fiducia/interfaces) present alongside so
      # `../fiducia-interfaces` resolves.
      - name: Validate GitHub Actions
        uses: docker://rhysd/actionlint@sha256:b1934ee5f1c509618f2508e6eb47ee0d3520686341fec936f3b79331f9315667
        with:
          args: repo/.github/workflows/ci.yml
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          persist-credentials: false
          repository: fiducia-cloud/fiducia-interfaces
          ref: 487e470c45ab5851e8f6f3b1dc048fe067fbf408
          path: fiducia-interfaces
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v6
        with:
          node-version: "22.22.1"
      - run: npm ci --ignore-scripts
        working-directory: repo
      # Syntax-check the Worker entrypoint (node --check src/index.mjs).
      - run: npm run check
        working-directory: repo
      # Worker unit tests (src/index.test.mjs). No deploy — the Worker runs on
      # Cloudflare's edge, not in CI.
      - run: node --test
        working-directory: repo
