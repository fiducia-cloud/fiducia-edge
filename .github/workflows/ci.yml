# CI: install, lint, and test the Worker on push and pull request.
name: ci
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          path: repo
      # GitHub Actions checks out one repo in isolation, but npm ci needs the
      # sibling `file:../` dep (@fiducia/interfaces) present alongside so
      # `../fiducia-interfaces` resolves.
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          repository: fiducia-cloud/fiducia-interfaces
          ref: bbd8b52ce729ec34b0a9bff4dda6d0a448181797
          path: fiducia-interfaces
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6
        with:
          node-version: "22"
      - run: npm ci --ignore-scripts
        working-directory: repo
      # Syntax-check the Worker entrypoint (node --check src/index.mjs).
      - run: npm run check
        working-directory: repo
      # Worker unit tests (src/index.test.mjs). No deploy — the Worker runs on
      # Cloudflare's edge, not in CI.
      - run: node --test
        working-directory: repo
