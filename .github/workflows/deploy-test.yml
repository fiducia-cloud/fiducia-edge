# Secret-gated deploy to the TEST environment.
#
# Required secrets (repo Settings -> Secrets and variables -> Actions):
#   CLOUDFLARE_API_TOKEN   Cloudflare API token with Workers Scripts:Edit scope.
#                          When absent, this workflow is a no-op (validation-only).
#   CLOUDFLARE_ACCOUNT_ID  (optional) Cloudflare account id, if wrangler cannot
#                          infer it from the token.
#
# Topology: app repos deploy to the TEST environment from their own CI; the
# fiducia-monorepo is the only PROD deploy. This is the TEST half for the edge
# Worker. wrangler.toml defines no [env.test], so this deploys the default env.
name: deploy-test

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read
  packages: read

jobs:
  deploy-test:
    runs-on: ubuntu-latest
    steps:
      # Worker code + the sibling file:../ dep (@fiducia/interfaces) that npm ci
      # resolves -- mirrors ci.yml's checkout layout.
      - uses: actions/checkout@v4
        with:
          path: repo
      - uses: actions/checkout@v4
        with:
          repository: fiducia-cloud/fiducia-interfaces
          path: fiducia-interfaces
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: deploy to test
        working-directory: repo
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then echo "no CLOUDFLARE_API_TOKEN secret — skipping test deploy (validation-only)"; exit 0; fi
          npm ci
          npx wrangler deploy
